<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Visitor Check-In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <!-- Three.js must be loaded before Vanta -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/build/three.min.js"></script>
</head>
<body>

  <!-- Vanta background container -->
  <div id="bgContainer"></div>

  <!-- Fixed clock — always visible -->
  <div class="kiosk-clock">
    <div id="idleTime" class="clock-time">00:00</div>
    <div id="idleDate" class="clock-date">Loading…</div>
  </div>

  <!-- Idle Screen -->
  <div id="idle" class="screen active" onclick="startCheckin()">
    <div class="idle-content">
      <div id="logoContainer" class="logo-container"></div>
      <div class="tap-prompt">
        <div class="tap-pulse"></div>
        <h1 id="companyName">Visitor Check-In</h1>
        <p>Tap anywhere to begin</p>
      </div>
    </div>
  </div>

  <!-- Step 1: Select Host -->
  <div id="step1" class="screen">
    <div class="form-card">
      <div class="step-header">
        <button class="btn-back" onclick="goIdle()">← Back</button>
        <div class="step-indicator">
          <span class="step active">1</span>
          <span class="step-line"></span>
          <span class="step">2</span>
          <span class="step-line"></span>
          <span class="step">3</span>
        </div>
      </div>
      <h2>Who are you here to see?</h2>
      <select id="employeeSelect" class="employee-select">
        <option value="">Loading employees…</option>
      </select>
      <button class="btn-primary" onclick="confirmHost()">Next →</button>
    </div>
  </div>

  <!-- Step 2: Visitor Details -->
  <div id="step2" class="screen">
    <div class="form-card">
      <div class="step-header">
        <button class="btn-back" onclick="showScreen('step1')">← Back</button>
        <div class="step-indicator">
          <span class="step done">1</span>
          <span class="step-line active"></span>
          <span class="step active">2</span>
          <span class="step-line"></span>
          <span class="step">3</span>
        </div>
      </div>
      <h2>Your Details</h2>
      <p class="visiting-label">Visiting: <strong id="hostDisplay"></strong></p>

      <div class="form-group">
        <input id="firstName" type="text" placeholder="First Name" autocomplete="off" oninput="onNameInput()" />
        <input id="lastName"  type="text" placeholder="Last Name"  autocomplete="off" oninput="onNameInput()" />
        <input id="company"   type="text" placeholder="Company"    autocomplete="off" />
      </div>

      <div id="returningBadge" class="returning-badge hidden">
        Welcome back! We've filled in your details.
      </div>

      <div class="stay-row">
        <label class="stay-label">Expected length of visit:</label>
        <div class="stay-inputs">
          <select id="stayHours" class="stay-select">
            <option value="0">0 hrs</option>
            <option value="1">1 hr</option>
            <option value="2">2 hrs</option>
            <option value="3">3 hrs</option>
            <option value="4">4 hrs</option>
            <option value="5">5 hrs</option>
            <option value="6">6 hrs</option>
            <option value="7">7 hrs</option>
            <option value="8">8 hrs</option>
          </select>
          <select id="stayMinutes" class="stay-select">
            <option value="0">0 min</option>
            <option value="5">5 min</option>
            <option value="10">10 min</option>
            <option value="15">15 min</option>
            <option value="30">30 min</option>
          </select>
        </div>
      </div>

      <button class="btn-primary" id="checkinBtn" onclick="submitForm()">Check In</button>
    </div>
  </div>

  <!-- Event Step 1: Select visitor -->
  <div id="event-step1" class="screen">
    <div class="form-card event-card">
      <div class="step-header">
        <button class="btn-back" onclick="goIdle()">← Back</button>
      </div>
      <h2 id="eventTitle">Event Check-In</h2>
      <p style="text-align:center;color:rgba(255,255,255,0.45);margin:-16px 0 16px;font-size:0.88rem;">
        Find your name and tap to check in or out
      </p>
      <input id="eventSearch" type="text" placeholder="Search name…" autocomplete="off"
        class="event-search" oninput="filterEventVisitors()" />
      <div id="eventVisitorList" class="event-visitor-list"></div>
    </div>
  </div>

  <!-- Event Step 2: Confirm check-in / check-out -->
  <div id="event-step2" class="screen">
    <div class="form-card success-card" style="position:relative;">
      <button class="btn-back" onclick="showScreen('event-step1')"
        style="position:absolute;top:24px;left:24px;">← Back</button>
      <h2 id="eventActionTitle">Check In</h2>
      <p id="eventVisitorName" style="font-size:1.4rem;margin:12px 0 6px;"></p>
      <p id="eventActionDetail" style="font-size:0.88rem;color:rgba(255,255,255,0.4);margin-bottom:28px;"></p>
      <button class="btn-primary" id="eventActionBtn" onclick="submitEventAction()">Confirm</button>
    </div>
  </div>

  <!-- Persistent special message banner (shown when enabled) -->
  <div id="kioskMessage" class="kiosk-message hidden"></div>

  <!-- Step 3: Success -->
  <div id="step3" class="screen">
    <div class="form-card success-card">
      <span class="checkmark">✓</span>
      <h2 id="step3Title">You're checked in!</h2>
      <p id="successMessage"></p>
      <div class="countdown-bar">
        <div id="countdownFill" class="countdown-fill"></div>
      </div>
      <p class="countdown-text">Returning to home in <span id="countdown">5</span>s</p>
    </div>
  </div>

  <!-- Hidden camera elements for silent photo capture -->
  <!-- Must be off-screen (not opacity:0 / 1×1) so iOS Safari still decodes frames -->
  <video id="kioskCamera" playsinline autoplay muted
    style="position:fixed;top:-9999px;left:-9999px;width:320px;height:240px;pointer-events:none;"></video>
  <canvas id="kioskPhotoCanvas" style="display:none;"></canvas>

  <script src="app.js"></script>
</body>
</html>
