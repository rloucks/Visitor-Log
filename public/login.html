<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Visitor Check-In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="login-page">

  <div class="login-card">
    <h1>Admin Panel</h1>
    <p class="subtitle">Visitor Check-In System</p>

    <div id="loginError" class="error-msg"></div>

    <div class="login-form-group">
      <label for="username">Username</label>
      <input id="username" type="text" placeholder="Enter username" autocomplete="username" />
    </div>

    <div class="login-form-group">
      <label for="password">Password</label>
      <input id="password" type="password" placeholder="Enter password" autocomplete="current-password" />
    </div>

    <button class="btn-primary" id="loginBtn" onclick="doLogin()">Sign In</button>
  </div>

  <script src="login.js"></script>
</body>
</html>
